<!DOCTYPE html>
<html>
  <head>
    <meta name="robots" content="noindex, nofollow">
    <title>Logan Fountain</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
<link rel="stylesheet" href="css/styles.css">
    
  </head>
  
  <body>

    <!--GAME SECTION-->
    <div id="game"></div>
    
    <!--HEADER-->
    <div class="header">
    <h1>The Logan Fountain</h1>
    </div>

    <!--INFORMATION-->
    <div class="card">
    <p>The fountian is a town favorite first installed in 19xx and getting a restoration in 2014.  Around the edge are bronze statues
    honoring local playwright William Inge.  
    </p>
    </div>

    <!--HISTORIC PHOTOS-->
    <div class="card">
        <h2>Historic Photos</h2>
        <p class="subtitle">Swipe to explore photos of the past</p>

    <div class="photo-scroll">
      <img src="images/1050SteamTrain/AT&SF1050 Delivery.jpg">                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          


    <script>
      console.log("playing:", localStorage.getItem("playing"));
      console.log("progress:", localStorage.getItem("progress"));
      
      const playing = localStorage.getItem("playing");
      const progress = parseInt(localStorage.getItem("progress") || "0");

      // CHANGE THESE NUMBERS PER PAGE
      const requiredStep = 11;
      const nextStep = 12;

      if (playing === "yes") {
        if (progress === requiredStep) {
          // Correct Step
          localStorage.setItem("progress", nextStep.toString());

          document.getElementById("game").innerHTML = `
            <h2> CORRECT! </h2>
            <p> You found the Logan Fountain!! </p>
            <p><strong>Next Clue:</strong>Well, they are called fossil fuels.</p>
            `;

        } else if (progress > requiredStep) {
          // Review State
          document.getElementById("game").innerHTML = `
            <p>You already found this location.</p>
            `;

        } else {
          // Out of Sequence
          document.getElementById("game").innerHTML = `
            <h2>Not quite</h2>
            <p>Take another look at the clue and try again.</p>
          `;
        }
      }
    </script>
    
  </body>
</html>
