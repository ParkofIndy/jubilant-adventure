<!DOCTYPE html>
<html>
  <head>
    <title>Stevens Building</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
  </head>
  <body>

    <h1>The Stevens Building</h1>
    <p>The Ralph Mitchell Zoo houses several species of animal that require a controlled climate.  In this building you will
    find multiple snake species, a sloth, an iguana, sugar gliders and chinchillas.  </p>

    <div id="game"></div>

    <a href="bears.html">Find Next!</a>

    <script>
      console.log("playing:", localStorage.getItem("playing"));
      console.log("progress:", localStorage.getItem("progress"));
      
      const playing = localStorage.getItem("playing");
      const progress = parseInt(localStorage.getItem("progress") || "0");

      // CHANGE THESE NUMBERS PER PAGE
      const requiredStep = 2;
      const nextStep = 3;

      if (playing === "yes") {
        if (progress === requiredStep) {
          // Correct Step
          localStorage.setItem("progress", nextStep.toString());

          document.getElementById("game").innerHTML = `
            <h2> CORRECT! </h2>
            <p> You found the Stevens Building. </p>
            <p><strong>Next Clue:</strong>Who's been eating our porridge and sleeping in our bed, come see us and talk. </p>
            `;

        } else if (progress > requiredStep) {
          // Review State
          document.getElementById("game").innerHTML = `
            <p>You already found this location.</p>
            `;

        } else {
          // Out of Sequence
          document.getElementById("game").innerHTML = `
            <h2>Not Yet</h2>
            <p>You need to find the previous clue first.</p>
          `;
        }
      }
    </script>
    
  </body>
</html>
