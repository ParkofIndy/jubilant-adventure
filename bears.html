<!DOCTYPE html>
<html>
  <head>
    <meta name="robots" content="noindex, nofollow">
    <title>The Bear Exhibit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <style>
      :root {
        --primary: #2f4f2f;
        font-family: Arial, sans-serif;
        margin: 16px;
        background: linear-gradient(to bottom, #f6f4ee, #e9e6dd);
        color: #222;
      }
        
      body{
        font-family: Arial, sans-serif;
        margin: 16px;
        background: linear-gradient(to bottom, #f6f4ee, #e9e6dd);
        color: #222;
      }

      .header {
        background: linear-gradient(to right, #2f4f2f, #3f6b3f);
        color: #ffffff;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 12px;

        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      }
        
      .card{
        background: rgba(255, 255, 255, 0.85);
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      h2 {
        color: var(--primary);
        margin-top: 0;
      }

      .subtitle {
        font-size: 0.9em;
        color: #666;
        margin-top: -5px;
        margin-bottom: 10px;
      }

      /* Photo scroller */
      .photo-scroll {
        display: flex;
        overflow-x: auto;
        gap: 10px
        padding: 10px 0;

        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

      .photo-scroll img {
        width: 80vw;
        max-width; 400px;
        height: auto;
        flex-shrink: 0;

        border-radius: 8px;
        scroll-snap-align: start;
      }
      
    </style>    
  </head>
  
  <body>

    <!--HEADER-->
    <div class="header">
      <h1>The Syrian Brown Bears</h1>
    </div>

    <!--GAME SECTION-->
    <div id="game"></div>

    <!--INFORMATION-->
    <div class="card"
    <p>Our two Syrian Brown Bears, named Samara and Amalia, spend time here relaxing in the cooler air of the ravine and digging
    in the rocks and mud.  They are gifted diggers utilizing tremendous strength and size to great effect. </p>
    </div>

    <!--HISTORIC PHOTOS-->
    <div class="card">
      <h2>Historic Photos</h2>
      <p class="subtitle">Swipe to explore photos</p>

      <div class="photo-scroll">
        <img src="images/ravine/Ravine Black and white photo.png">
      </div>
    </div>
  
    <script>
      console.log("playing:", localStorage.getItem("playing"));
      console.log("progress:", localStorage.getItem("progress"));
      
      const playing = localStorage.getItem("playing");
      const progress = parseInt(localStorage.getItem("progress") || "0");

      // CHANGE THESE NUMBERS PER PAGE
      const requiredStep = 3;
      const nextStep = 4;

      if (playing === "yes") {
        if (progress === requiredStep) {
          // Correct Step
          localStorage.setItem("progress", nextStep.toString());

          document.getElementById("game").innerHTML = `
            <h2> CORRECT! </h2>
            <p> You found the Syrian Brown Bears. </p>
            <p><strong>Next Clue:</strong> Little Miss Muffet sat on a tuffet watching a castle and shoe.</p>
            `;

        } else if (progress > requiredStep) {
          // Review State
          document.getElementById("game").innerHTML = `
            <p>You already found this location.</p>
            `;

        } else {
          // Out of Sequence
          document.getElementById("game").innerHTML = `
            <h2>Not Yet</h2>
            <p>You need to find the previous clue first.</p>
          `;
        }
      }
    </script>
  </body>
</html>
  </body>
</html>
