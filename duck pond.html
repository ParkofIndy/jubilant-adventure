<!DOCTYPE html>
<html>
  <head>
    <meta name="robots" content="noindex, nofollow">
    <title>Swan Pond</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<link rel="stylesheet" href="css/styles.css">
    
  </head>
  
  <body>
    
    <!--HEADER-->
    <div class="header">
    <h1>The Swan Pond</h1>
    </div>

    <!--GAME SECTION-->
    <div id="game"></div>

    <!--INFORMATION-->
    <div class="card">
    <p> Built by a public works project in 1935, this swan pond is a perfect spot to relax and take in the sights.
    </p></div>

    <!--HISTORIC PHOTOS-->
    <div class="card">
      <h2>Historic Photos</h2>
      <p class="subtitle">Swipe to explore photos</p>
    <div class="photo-scroll">
      <img src="images/swan Pond/SwanPond1930's.jpg">
    </div>
    </div>
    
    <script>
      console.log("playing:", localStorage.getItem("playing"));
      console.log("progress:", localStorage.getItem("progress"));
      
      const playing = localStorage.getItem("playing");
      const progress = parseInt(localStorage.getItem("progress") || "0");

      // CHANGE THESE NUMBERS PER PAGE
      const requiredStep = 7;
      const nextStep = 8;

      if (playing === "yes") {
        if (progress === requiredStep) {
          // Correct Step
          localStorage.setItem("progress", nextStep.toString());

          document.getElementById("game").innerHTML = `
            <h2> CORRECT! </h2>
            <p> You found The Swan Pond!! </p>
            <p><strong>Next Clue:</strong>The location of the first professional baseball game under artificial lights.</p>
            `;

        } else if (progress > requiredStep) {
          // Review State
          document.getElementById("game").innerHTML = `
            <p>You already found this location.</p>
            `;

        } else {
          // Out of Sequence
          document.getElementById("game").innerHTML = `
            <h2>Not Yet</h2>
            <p>You need to find the previous clue first.</p>
          `;
        }
      }
    </script>
    
  </body>
</html>
