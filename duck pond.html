<!DOCTYPE html>
<html>
  <head>
    <title>Duck Pond</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
  </head>
  <body>

    <h1>The Duck Pond</h1>
    <p>Built by a public works project in 1935, this duck pond is a relaxing spot to relax and take in the sights.</p>

    <div id="game"></div>

    <script>
      console.log("playing:", localStorage.getItem("playing"));
      console.log("progress:", localStorage.getItem("progress"));
      
      const playing = localStorage.getItem("playing");
      const progress = parseInt(localStorage.getItem("progress") || "0");

      // CHANGE THESE NUMBERS PER PAGE
      const requiredStep = 7;
      const nextStep = 8;

      if (playing === "yes") {
        if (progress === requiredStep) {
          // Correct Step
          localStorage.setItem("progress", nextStep.toString());

          document.getElementById("game").innerHTML = `
            <h2> CORRECT! </h2>
            <p> You found The Duck Pond!! </p>
            <p><strong>Next Clue:</strong>The location of the first professional baseball game under artificial lights.</p>
            `;

        } else if (progress > requiredStep) {
          // Review State
          document.getElementById("game").innerHTML = `
            <p>You already found this location.</p>
            `;

        } else {
          // Out of Sequence
          document.getElementById("game").innerHTML = `
            <h2>Not Yet</h2>
            <p>You need to find the previous clue first.</p>
          `;
        }
      }
    </script>
    
  </body>
</html>
