
<!DOCTYPE html>
<html>
  <head>
    <meta name="robots" content="noindex, nofollow">
    <title>Scavenger Hunt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        font-family: Arial, sans-serif;
        margin: 16px;
        background: linear-gradient(to bottom, #f6f4ee, #e9e6dd);
        color: #222;
      }
        
      body{
        font-family: Arial, sans-serif;
        margin: 16px;
        background: linear-gradient(to bottom, #f6f4ee, #e9e6dd);
        color: #222;
      }

      .header {
        background: var(--primary);
        color: white;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 12px;
      }
        
      .card{
        background: rgba(255, 255, 255, 0.85);
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      h2 {
        color: var(--primary);
        margin-top: 0;
      }

      .subtitle {
        font-size: 0.9em;
        color: #666;
        margin-top: -5px;
        margin-bottom: 10px;
      }

      /* Photo scroller */
      .photo-scroll {
        display: flex;
        overflow-x: auto;
        gap: 10px
        padding: 10px 0;

        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

      .photo-scroll img {
        width: 80vw;
        max-width; 400px;
        height: auto;
        flex-shrink: 0;

        border-radius: 8px;
        scroll-snap-align: start;
      }
      
    </style>
  </head>
  <body>
   
    <h1>Welcome to the Zoo Scavenger Hunt</h1>
    
    <!-- Intro Section -->
    <div id="intro">
    <p>Would you like to try a scavenger hunt?
    Explore the park and zoo, meet animals and learn history.</p>

    <p>Scan the QR codes at each location to progress.
    Follow the clues in order to complete the hunt.
    </p>

    <button onclick="startHunt()">Start Hunt</button>
    </div>

    <!-- Game Section (Hidden till playing) -->
    <div id="game" style="display:none;">
      <h2>First Clue:</h2>
      <p>The birthplace of Miss Able, a monkey sent to space.</p>

      <button onclick="quitHunt()">Quit Hunt or Start Over</button>
    </div>

    <script>
      
      function startHunt() {
        // Reset game and start
        
        localStorage.clear();
        localStorage.setItem("playing", "yes");
        localStorage.setItem("progress", "1");
        
        document.getElementById("intro").style.display = "none";
        document.getElementById("game").style.display = "block";
      }

      function quitHunt() {
        // clear progress
        localStorage.clear();
        document.getElementById("intro").style.display = "block";
        document.getElementById("game").style.display = "none";
      }
      </script>
    
  </body>
</html>
