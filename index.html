
<!DOCTYPE html>
<html>
  <head>
    <title>Scavenger Hunt</title>
  </head>
  <body>
   
    <h1>Welcome to the Zoo Scavenger Hunt</h1>
    
    <!-- Intro Section -->
    <div id="intro">
    <p>Would you like to try a scavenger hunt?
    Explore the park and zoo, meet animals and learn history.</p>

    <p>Scan the QR codes at each exhibit to progress.
    Follow the clues in order to complete the hunt.
    </p>

    <button onclick="startHunt()">Start Hunt</button>
    </div>

    <!-- Game Section (Hidden till playing) -->
    <div id="game" style="display:none;">
      <h2>First Clue</h2>
      <p id="clueText"></p>
    </div>

    <script>
      
      function startHunt() {
        // Reset game and start
        alert("Button clicked"); // temporary for debug
        
        localStorage.clear();
        localStorage.setItem("playing", "yes");
        localStorage.setItem("progress", "1");
      }

      const playing = localStorage.getItem("playing");
        if (playing === "yes"){
          // hide intro, show game
        document.getElementById("intro").style.display = "none";
        document.getElementById("game").style.display = "block";

        // show first clue
        document.getElementbyId("clueText").innerText = 
          "The birthplace of Miss Able, a monkey sent to space.";
        }

        // hide intro, show game
       // document.getElementById("intro").style.display = "none";
       // document.getElementById("game").style.display = "block";

        // show first clue
       // document.getElementbyId("clueText").innerText = 
        //  "The birthplace of Miss Able, a monkey sent to space."
      </script>
    
    <a href="monkeyisland.html">You found it!</a>
    
  </body>
</html>
