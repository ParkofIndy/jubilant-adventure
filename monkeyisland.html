<!DOCTYPE html>
<html>
  <head>
    <title>Monkey Island</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      .photo-scroll {
        dispaly: flex;
        overflow-x: auto;
        gap: 10px;
        padding: 10px 0;

        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

        .photo-scroll img {
          width: 80vw;
          max-width: 400px;
          height: auto;
          flex-shrink: 0;

          border-radius: 8px;
          scroll-snap-align: start;
        }
      
      body{
        font-family: Arial, sans-serif;
        margin: 16px;
        background: linear-gradient(to bottom, #f6f4ee, #e9e6dd);
        color: #222;
      }

      .card{
        background: rgba(255, 255, 255, 0.7);
        padding: 12px;
        border-radius: 10px;
      }
    </style>
    
  </head>
  <body>
    
    <div id="game"></div>
  
    <h1>Monkey Island</h1>
    <p>Built by a public works project in 1932.  Monkey Island is the birthplace of Miss Able.  Miss Able was a capuchin monkey sent into
    space and propelled the United States of America forward in the space race.</p>
      <div class="photo-scroll">
        <img src="images/MonkeyIsland/Monkey Island Black and White.jfif>
        <img src="images/miss able/014 front.jpg">
        <img src="images/miss able/Able solo.jpg">
        <img src="images/">
      </div>
    
    <script>
      console.log("playing:", localStorage.getItem("playing"));
      console.log("progress:", localStorage.getItem("progress"));
      
      const playing = localStorage.getItem("playing");
      const progress = parseInt(localStorage.getItem("progress") || "0");

      // CHANGE THESE NUMBERS PER PAGE
      const requiredStep = 1;
      const nextStep = 2;

      if (playing === "yes") {
        if (progress === requiredStep) {
          // Correct Step
          localStorage.setItem("progress", nextStep.toString());

          document.getElementById("game").innerHTML = `
            <h2> CORRECT! </h2>
            <p> You found Monkey Island. </p>
            <p><strong>Next Clue:</strong>Housing several small animal exhibits this blue building is North of Monkey Island.</p>
            `;

        } else if (progress > requiredStep) {
          // Review State
          document.getElementById("game").innerHTML = `
            <p>You already found this location.</p>
            <p><strong>Next Clue:</strong> Housing several small animal exhibits this blue building was constructed in 19xx with efforts from. </p>
            `;

        } else {
          // Out of Sequence
          document.getElementById("game").innerHTML = `
            <h2>Not Yet</h2>
            <p>You need to find the previous clue first.</p>
          `;
        }
      }
    </script>
    
  </body>
</html>
